<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rate Calculator · Cheerful Logistics</title>
<meta name="description" content="Get an instant freight rate estimate." />
<link rel="icon" href="favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div id="site-header"></div>
<main>

<section class="section" style="padding-top:56px">
  <div class="container">
    <span class="eyebrow">Rate Calculator</span>
    <h1>Instant freight estimate</h1>
    <p>Demo calculator — produces representative quotes using transparent multipliers.</p>

    <div class="grid cols-2" style="margin-top:24px; align-items:start">
      <form id="rateForm" class="form-card">
        <div class="field"><label>Distance (miles)</label>
          <input class="input" type="number" name="miles" min="1" value="500" required/></div>
        <div class="field"><label>Equipment</label>
          <select class="select" name="equipment">
            <option value="sprinter">Sprinter / Cargo Van</option>
            <option value="smallStraight">Small Straight (16–22ft)</option>
            <option value="largeStraight">Large Straight (24–26ft)</option>
            <option value="semi">Tractor Trailer</option>
          </select></div>
        <div class="field"><label>Urgency</label>
          <select class="select" name="urgency">
            <option value="standard">Standard</option>
            <option value="expedited">Expedited (24h)</option>
            <option value="hotshot">Hotshot (direct)</option>
          </select></div>
        <button class="btn btn-primary" type="submit">Calculate</button>
        <div class="rate-result" id="rateResult" style="display:none"></div>
      </form>
      <div>
        <div class="card">
          <h3>How rates work</h3>
          <ul class="checklist">
            <li>Base rate × distance</li>
            <li>Urgency multiplier (1.00× / 1.25× / 1.45×)</li>
            <li>Fuel surcharge (~18%)</li>
            <li>Accessorials added at booking</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
</main>
<div id="site-footer"></div>
<script src="assets/js/main.js"></script>
</body>
</html>
